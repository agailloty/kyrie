  <script>
    (function() {
      var mode = 'auto';
      var stored = localStorage.getItem('colorMode');
      if (stored) mode = stored;
      if (mode === 'auto') {
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark');
        }
      } else if (mode === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

<script>
  (function () {
    var btn = document.querySelector('.nav-toggle');
    var panel = document.getElementById('mobile-nav');
    if (!btn || !panel) return;
    btn.addEventListener('click', function () {
      var open = panel.classList.toggle('is-open');
      btn.setAttribute('aria-expanded', String(open));
      btn.classList.toggle('is-open', open);
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        panel.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
        btn.classList.remove('is-open');
      }
    });
  })();

  
  (function () {
    var toggles = document.querySelectorAll('.theme-toggle');
    if (!toggles.length) return;
    
    function isDark() {
      return document.documentElement.classList.contains('dark');
    }
    
    function setTheme(dark) {
      if (dark) {
        document.documentElement.classList.add('dark');
        document.documentElement.classList.remove('light');
        localStorage.setItem('colorMode', 'dark');
      } else {
        document.documentElement.classList.remove('dark');
        document.documentElement.classList.add('light');
        localStorage.setItem('colorMode', 'light');
      }
    }
    
    toggles.forEach(function(toggle) {
      toggle.addEventListener('click', function () {
        setTheme(!isDark());
      });
    });
  })();
</script>

  <script>
  (function () {
    document.querySelectorAll('[data-filter-bar]').forEach(function (bar) {
      var showcase = bar.nextElementSibling;
      if (!showcase) return;
      bar.addEventListener('click', function (e) {
        var btn = e.target.closest('.filter-btn');
        if (!btn) return;
        bar.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('is-active'); });
        btn.classList.add('is-active');
        var cat = btn.dataset.cat;
        showcase.querySelectorAll('.showcase-card').forEach(function (card) {
          var cats = card.dataset.cats ? card.dataset.cats.split(' ') : [];
          card.hidden = cat !== '*' && !cats.includes(cat);
        });
      });
    });
  })();
  </script>

  <script>
    (function () {
      document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('pre').forEach(function (pre) {
          var code = pre.innerText || pre.textContent;
          
          
          var wrapper = document.createElement('div');
          wrapper.className = 'highlight-wrapper';
          pre.parentNode.insertBefore(wrapper, pre);
          wrapper.appendChild(pre);
          
          
          var btn = document.createElement('button');
          btn.className = 'copy-code-btn';
          btn.type = 'button';
          btn.textContent = 'Copier';
          btn.setAttribute('aria-label', 'Copier le code');
          wrapper.appendChild(btn);
          
          btn.addEventListener('click', function (e) {
            e.preventDefault();
            navigator.clipboard.writeText(code).then(function () {
              btn.textContent = 'Copié!';
              btn.classList.add('copied');
              setTimeout(function () {
                btn.textContent = 'Copier';
                btn.classList.remove('copied');
              }, 2000);
            }).catch(function () {
              btn.textContent = 'Erreur';
            });
          });
        });
      });
    })();
  </script>
