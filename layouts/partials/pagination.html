{{ $p := .Paginator }}
{{ if gt $p.TotalPages 1 }}
<nav class="pagination" aria-label="{{ i18n "pagination" | default "Pagination" }}">
  {{ if $p.HasPrev }}
    <a href="{{ $p.Prev.URL }}" aria-label="{{ i18n "prevPage" | default "Page précédente" }}">&#8592;</a>
  {{ else }}
    <span class="page-item disabled" aria-disabled="true">&#8592;</span>
  {{ end }}

  {{ range $p.Pagers }}
    {{ if eq . $p }}
      <span class="page-item active" aria-current="page">{{ .PageNumber }}</span>
    {{ else }}
      <a href="{{ .URL }}">{{ .PageNumber }}</a>
    {{ end }}
  {{ end }}

  {{ if $p.HasNext }}
    <a href="{{ $p.Next.URL }}" aria-label="{{ i18n "nextPage" | default "Page suivante" }}">&#8594;</a>
  {{ else }}
    <span class="page-item disabled" aria-disabled="true">&#8594;</span>
  {{ end }}
</nav>
{{ end }}
