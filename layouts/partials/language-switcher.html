{{ if gt (len .Site.Home.AllTranslations) 1 }}
  <div class="lang-switch" aria-label="language switcher">
    <button class="lang-toggle" aria-haspopup="true" aria-expanded="false" title="Change language">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="2" y1="12" x2="22" y2="12"></line>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
      </svg>
    </button>
    <div class="lang-dropdown">
      {{ range .Site.Home.AllTranslations }}
        <a href="{{ .RelPermalink }}" hreflang="{{ .Language.Lang }}" class="{{ if eq $.Site.Language.Lang .Language.Lang }}is-active{{ end }}">{{ .Language.LanguageName }}</a>
      {{ end }}
    </div>
  </div>
{{ end }}
