{{ define "main" }}
  <section class="content-shell">
    {{ if .Site.Params.docs.sidebar }}
      {{ partial "docs-sidebar.html" . }}
    {{ end }}
    <div class="single">
      <h1>{{ .Title }}</h1>
      {{ with .Description }}<p>{{ . }}</p>{{ end }}
      <div class="grid">
        {{ range .Pages.ByWeight }}
          <article class="card">
            <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
            <p>{{ .Summary }}</p>
          </article>
        {{ end }}
      </div>
    </div>
  </section>
{{ end }}
